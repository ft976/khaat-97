<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle (Optional for App Icon) -->
  <rect width="512" height="512" rx="128" fill="#f8fafc" />
  
  <g filter="url(#shadow)">
    <!-- Left Circle -->
    <circle cx="200" cy="256" r="140" fill="url(#grad1)" fill-opacity="0.6" />
    <!-- Right Circle -->
    <circle cx="312" cy="256" r="140" fill="url(#grad2)" fill-opacity="0.8" />
    
    <!-- Overlap Area Highlight -->
    <clipPath id="overlap">
      <circle cx="200" cy="256" r="140" />
    </clipPath>
    <circle cx="312" cy="256" r="140" fill="#ffffff" fill-opacity="0.2" clip-path="url(#overlap)" />
  </g>
</svg>
